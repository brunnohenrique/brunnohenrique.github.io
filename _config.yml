about_content: | # this will include new lines to allow paragraphs
  **Senior Software Engineer** at **Intuit** with **10+ years** in the industry. Based in **Brazil**, I collaborate with **distributed teams** worldwide on product development and **REST API** architecture—shipping reliable software that matters to users and the business.

  My career spans **startups, SaaS, and enterprise**, where I’ve helped design and evolve systems, modernize applications, and raise engineering quality. I combine deep hands-on work with experience in technology leadership and entrepreneurship.

  **Strong experience with:** <mark>Ruby on Rails</mark>, <mark>REST APIs</mark>, <mark>PostgreSQL</mark> & <mark>MySQL</mark>, <mark>JavaScript</mark> / <mark>React</mark> / <mark>Vue.js</mark>, <mark>Cloud</mark> (AWS, DigitalOcean, Heroku), <mark>Docker</mark>, <mark>Git</mark> & Agile workflows, and <mark>fullstack web development</mark>.

  I enjoy complex technical problems, improving developer experience, and clear, maintainable architecture.

